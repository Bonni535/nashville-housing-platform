# airflow/docker-compose.yml

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.12
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    PIPELINE_HOME: /opt/airflow/nashville-housing-platform
    PYTHONPATH: /opt/airflow/nashville-housing-platform
  env_file:
    - ../.env
  volumes:
    # Repo root mounted into container
    - ../:/opt/airflow/nashville-housing-platform
    # DAGs folder
    - ./dags:/opt/airflow/dags
    # dbt profiles — mounted to airflow user home, NOT /root/.dbt
    - ~/.dbt/profiles.yml:/home/airflow/.dbt/profiles.yml:ro
    # Airflow logs
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres-db:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        pip install -e /opt/airflow/nashville-housing-platform --quiet &&
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Luca --lastname Bonini --role Admin --email luca@example.com
      "
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "
        pip install -e /opt/airflow/nashville-housing-platform --quiet &&
        airflow webserver
      "
    ports:
      - "8082:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "
        pip install -e /opt/airflow/nashville-housing-platform --quiet &&
        airflow scheduler
      "
    restart: always

volumes:
  postgres-db:
  airflow-logs: