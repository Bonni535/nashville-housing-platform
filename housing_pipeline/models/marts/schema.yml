# models/marts/schema.yml

version: 2

models:
  - name: fct_monthly_zip
    description: "Wide fact table: Redfin market activity + Zillow valuations + FRED mortgage rate per zip per month"
    columns:
      - name: zip_code
        tests:
          - not_null
      - name: period_month
        tests:
          - not_null
      - name: avg_mortgage_rate
        description: "FRED MORTGAGE30US weekly rates averaged to monthly. Left join on period_month — non-null for all months covered by Redfin spine (2012–present) since FRED history goes back to 2000."
        tests:
          - not_null
      - name: computed_months_of_supply
        description: "Derived inline as median_inventory / NULLIF(median_homes_sold, 0). Nullable by design — Redfin does not populate months_of_supply at Nashville zip level (0 non-null out of 37,677 rows). Not used by the dashboard — Python derives this value in the Streamlit app instead."

  - name: dim_geography
    description: "Static dimension: one row per MSA zip with region, county, demographics"
    columns:
      - name: zip_code
        tests:
          - not_null
          - unique
      - name: county_fips
        tests:
          - not_null
      - name: nashville_region
        tests:
          - not_null

  - name: fct_opportunity_score
    description: "Composite opportunity score per zip using 7 min-max normalized signals (0–100 range). Scores range ~40–82 across 76 Nashville MSA zip codes. Dashboard sliders recompute client-side with custom weights."
    columns:
      - name: zip_code
        tests:
          - not_null
          - unique
      - name: opportunity_score
        description: "Unweighted average of all 7 signal scores. Nulls imputed to 50 per signal so every zip always receives a score."
        tests:
          - not_null
      - name: permit_score
        description: "Min-max normalized building permit activity signal (0–100). Suburban zips with no Metro Codes data imputed with MSA average permit_count before normalization."
        tests:
          - not_null
      - name: data_confidence
        description: "Signal completeness per zip. High = Redfin market data and MNPD crime data both present. Partial = one signal imputed (suburban crime or missing Redfin). Low = both market and crime data absent."
        tests:
          - not_null
          - accepted_values:
              values: ['High', 'Partial', 'Low']